<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <!-- Mask to hide 30° sector from top-right -->
    <mask id="sectorMask">
      <rect width="100" height="100" fill="white"/>
      <path d="M 50,50 L 50,0 A 50,50 0 0,1 93.3,25 Z" fill="black"/>
    </mask>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>
  <!-- Target circles with sector cut (thicker strokes) -->
  <g mask="url(#sectorMask)">
    <circle cx="50" cy="50" r="32" stroke="white" stroke-width="7" fill="none" opacity="0.5"/>
    <circle cx="50" cy="50" r="16" stroke="white" stroke-width="7" fill="none"/>
  </g>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="white"/>
</svg>
